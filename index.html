<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼각함수 레이더 주파수 매칭 게임</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --radar-target: #ff3e3e;
            --radar-user: #00ff66;
            --accent-blue: #58a6ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Malgun Gothic', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            user-select: none;
        }

        .container {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
            padding: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .status-item {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .timer-badge {
            background-color: #da3637;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
        }

        .radar-screen-wrapper {
            position: relative;
            background-color: #05070a;
            border: 2px solid #21262d;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 450px;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        .helper-text {
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 15px;
            text-align: right;
            padding-right: 5px;
        }

        .zoom-panel {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 6px;
            z-index: 5;
        }

        .zoom-btn {
            background-color: rgba(22, 27, 34, 0.9);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            width: 38px;
            height: 38px;
            border-radius: 6px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            background-color: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        .formula-display {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .control-group {
            background: #21262d;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #8b949e;
        }

        .num-input {
            width: 100%;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            font-size: 1.1rem;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            text-align: center;
        }

        .num-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 5px rgba(88, 166, 255, 0.4);
        }

        .select-input {
            width: 100%;
            background-color: #0d1117;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            font-size: 1.1rem;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', sans-serif;
            text-align: center;
            text-align-last: center;
            cursor: pointer;
            outline: none;
        }

        .select-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 5px rgba(88, 166, 255, 0.4);
        }

        .overlay-message {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none;
            z-index: 10;
        }

        .overlay-message h2 {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .overlay-message p {
            font-size: 1.1rem;
            color: #8b949e;
            margin-bottom: 20px;
        }

        .overlay-message button {
            padding: 12px 35px;
            background-color: var(--accent-blue);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="status-item">[ROUND <span id="txt-round">1</span>]</div>
        <div class="status-item" style="color: var(--accent-blue);">삼각함수 레이더 주파수 매칭 게임</div>
        <div class="status-item">남은 시간: <span id="txt-timer" class="timer-badge">60.0s</span></div>
    </div>

    <div class="radar-screen-wrapper">
        <canvas id="radarCanvas" width="760" height="450"></canvas>
        
        <div class="zoom-panel">
            <div class="zoom-btn" onclick="adjustZoom(0.1)" title="확대">+</div>
            <div class="zoom-btn" onclick="resetView()" title="화면 리셋">⟲</div>
            <div class="zoom-btn" onclick="adjustZoom(-0.1)" title="축소">−</div>
        </div>

        <div class="overlay-message" id="overlay">
            <h2 id="overlay-title">LOCK-ON SUCCESS</h2>
            <p id="overlay-desc">모든 주파수의 파형이 완벽하게 일치됐습니다.</p>
            <button onclick="nextRound()" id="overlay-btn">다음 단계 진입</button>
        </div>
    </div>
    <div class="helper-text">💡 그래프 스크린을 드래그하여 화면을 자유롭게 이동할 수 있습니다.</div>

    <div class="formula-display">
        <span style="color: var(--radar-user); font-weight: bold;">내 레이더 수식:</span> 
        y = <span id="val-a">1</span> · sin(<span id="val-b">2π</span>/주기 · (x + <span id="val-c">0</span>)) + <span id="val-d">0</span>
        &nbsp;&nbsp;(현재 설정 주기: <span id="val-period-text" style="color: #e3b341; font-weight: bold;">π/2</span>)
    </div>

    <div class="control-grid">
        <div class="control-group">
            <div class="control-label">진폭 값 입력 (a)</div>
            <input type="number" id="input-a" class="num-input" value="1" min="1" max="6" step="1" oninput="onInputChange()">
        </div>
        <div class="control-group">
            <div class="control
